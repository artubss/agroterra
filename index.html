<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AgroTerra - Apresentação 3D</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body, #root {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #08140d;
      color: white;
      overflow: hidden;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(76, 175, 80, 0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(255, 193, 7, 0.15), transparent 25%),
        linear-gradient(135deg, #07110b 0%, #102718 45%, #182e1d 100%);
    }

    .app {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    .bg-layer {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.25;
      pointer-events: none;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      opacity: 0;
      transform: scale(1.03);
      pointer-events: none;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .slide.active {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    .slide-shell {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .fullscreen-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: brightness(0.42) saturate(1.1);
    }

    .overlay-dark {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.25), rgba(0,0,0,0.45)),
        linear-gradient(90deg, rgba(0,0,0,0.55), rgba(0,0,0,0.2));
    }

    .content {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      padding: 40px 50px 96px;
      display: flex;
      flex-direction: column;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    .hero-center {
      margin: auto;
      text-align: center;
      max-width: 1100px;
      width: 100%;
    }

    .logo {
      width: min(34vw, 420px);
      max-width: 420px;
      min-width: 180px;
      filter: drop-shadow(0 14px 34px rgba(0,0,0,0.45));
      animation: floatLogo 4s ease-in-out infinite;
    }

    @keyframes floatLogo {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-10px) scale(1.015); }
    }

    .title {
      font-size: clamp(32px, 6vw, 82px);
      font-weight: 900;
      line-height: 0.98;
      margin: 18px 0 16px;
      text-shadow: 0 6px 30px rgba(0,0,0,0.35);
    }

    .subtitle {
      font-size: clamp(18px, 2.3vw, 34px);
      color: #ffe082;
      font-weight: 700;
      margin-bottom: 20px;
      text-shadow: 0 4px 18px rgba(0,0,0,0.35);
    }

    .desc {
      font-size: clamp(15px, 1.5vw, 23px);
      line-height: 1.6;
      color: rgba(255,255,255,0.92);
      max-width: 980px;
      margin: 0 auto;
    }

    .team-box {
      margin: 30px auto 0;
      width: min(920px, 90%);
      padding: 20px 24px;
      border-radius: 22px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.22);
    }

    .team-title {
      font-size: 20px;
      font-weight: 800;
      color: #b8f28a;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .team-placeholders {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 12px;
    }

    .placeholder {
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px dashed rgba(255,255,255,0.35);
      background: rgba(0,0,0,0.14);
      text-align: left;
      color: rgba(255,255,255,0.84);
      min-width: 0;
      word-break: break-word;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .badge {
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      font-weight: 700;
      color: #dcedc8;
      text-align: center;
    }

    .section-title {
      font-size: clamp(28px, 4vw, 58px);
      font-weight: 900;
      margin: 18px 0 10px;
    }

    .section-text {
      font-size: clamp(15px, 1.5vw, 24px);
      line-height: 1.6;
      color: rgba(255,255,255,0.92);
      max-width: 920px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 28px;
      align-items: center;
      width: 100%;
      min-height: 0;
      flex: 1;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 18px;
      margin-top: 24px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 16px 45px rgba(0,0,0,0.24);
      backdrop-filter: blur(8px);
      min-width: 0;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: clamp(20px, 2vw, 24px);
      color: #fff59d;
    }

    .card p {
      margin: 0;
      color: rgba(255,255,255,0.9);
      line-height: 1.55;
      font-size: clamp(15px, 1.3vw, 17px);
    }

    .machine-stage {
      width: 100%;
      height: 100%;
      min-height: 420px;
      border-radius: 28px;
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(circle at center, rgba(139, 195, 74, 0.15), transparent 32%),
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)),
        #101712;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    .machine-overlay {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 14px;
      z-index: 2;
      pointer-events: none;
      flex-wrap: wrap;
    }

    .legend {
      background: rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
      border-radius: 18px;
      padding: 14px 16px;
      max-width: 52%;
    }

    .legend h4 {
      margin: 0 0 8px;
      font-size: 18px;
      color: #b8f28a;
    }

    .legend p {
      margin: 0;
      font-size: 15px;
      line-height: 1.45;
      color: rgba(255,255,255,0.9);
    }

    .step-indicator {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .step-pill {
      padding: 10px 12px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 13px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.08);
      white-space: nowrap;
    }

    .step-pill.active {
      background: linear-gradient(90deg, #7cb342, #f9a825);
      color: white;
      box-shadow: 0 10px 24px rgba(124,179,66,0.32);
    }

    .process-list {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 18px;
      margin-top: 28px;
    }

    .process-item {
      padding: 20px;
      border-radius: 22px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      min-width: 0;
    }

    .process-item .num {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #66bb6a, #fbc02d);
      font-weight: 900;
      margin-bottom: 12px;
    }

    .process-item h4 {
      margin: 0 0 8px;
      font-size: clamp(18px, 1.6vw, 21px);
      color: #fff59d;
    }

    .process-item p {
      margin: 0;
      line-height: 1.5;
      color: rgba(255,255,255,0.9);
      font-size: clamp(14px, 1.2vw, 16px);
    }

    .benefits {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 20px;
      margin-top: 22px;
    }

    .benefit {
      border-radius: 24px;
      padding: 22px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 16px 45px rgba(0,0,0,0.24);
      min-width: 0;
    }

    .benefit h3 {
      margin: 0 0 10px;
      color: #b8f28a;
      font-size: clamp(20px, 2vw, 24px);
    }

    .benefit p {
      margin: 0;
      font-size: clamp(15px, 1.3vw, 17px);
      line-height: 1.6;
      color: rgba(255,255,255,0.92);
    }

    .footer-nav {
      position: absolute;
      left: 28px;
      right: 28px;
      bottom: max(18px, env(safe-area-inset-bottom));
      z-index: 5;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      pointer-events: none;
    }

    .footer-nav > * {
      pointer-events: auto;
    }

    .nav-btn {
      border: none;
      color: white;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      width: 58px;
      height: 58px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 24px;
      font-weight: bold;
      transition: 0.25s ease;
      backdrop-filter: blur(10px);
      touch-action: manipulation;
    }

    .nav-btn:hover {
      transform: translateY(-2px) scale(1.05);
      background: rgba(255,255,255,0.15);
    }

    .dots {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.2);
      transition: 0.3s ease;
    }

    .dot.active {
      width: 34px;
      border-radius: 999px;
      background: linear-gradient(90deg, #7cb342, #ffca28);
    }

    .help-box {
      margin-top: 22px;
      padding: 20px;
      border-radius: 22px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .help-box h4 {
      margin: 0 0 10px;
      color: #fff59d;
      font-size: clamp(20px, 2vw, 22px);
    }

    .help-box ul {
      margin: 0;
      padding-left: 22px;
      line-height: 1.7;
      font-size: clamp(15px, 1.3vw, 17px);
    }

    .final-quote {
      font-size: clamp(28px, 4.5vw, 68px);
      font-weight: 900;
      line-height: 1.08;
      text-align: center;
      max-width: 1000px;
      margin: 30px auto 0;
    }

    .small-note {
      text-align: center;
      margin-top: 18px;
      color: rgba(255,255,255,0.86);
      font-size: clamp(17px, 2vw, 20px);
    }

    .shine {
      position: absolute;
      inset: 0;
      background: linear-gradient(115deg, transparent 30%, rgba(255,255,255,0.08) 50%, transparent 70%);
      transform: translateX(-100%);
      animation: shineMove 5s linear infinite;
      pointer-events: none;
    }

    @keyframes shineMove {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    @media (max-width: 1100px) {
      .grid-2 {
        grid-template-columns: 1fr;
        gap: 18px;
        padding-bottom: 10px;
      }

      .process-list,
      .benefits,
      .cards,
      .team-placeholders {
        grid-template-columns: 1fr;
      }

      .legend {
        max-width: 100%;
      }

      .machine-stage {
        min-height: 360px;
      }
    }

    @media (max-width: 768px) {
      html, body, #root, .app {
        height: 100dvh;
      }

      .content {
        padding: 18px 16px 88px;
      }

      .top-bar {
        gap: 10px;
        justify-content: center;
      }

      .badge {
        width: 100%;
        padding: 10px 14px;
        font-size: 14px;
      }

      .hero-center {
        margin: 0 auto;
        padding-top: 10px;
        padding-bottom: 10px;
      }

      .logo {
        width: min(70vw, 320px);
        min-width: 140px;
      }

      .team-box {
        width: 100%;
        padding: 16px;
        border-radius: 18px;
      }

      .machine-stage {
        min-height: 320px;
        height: 48vh;
        max-height: 520px;
        border-radius: 22px;
      }

      .machine-overlay {
        left: 10px;
        right: 10px;
        bottom: 10px;
        gap: 10px;
      }

      .legend {
        padding: 12px;
        border-radius: 14px;
      }

      .legend h4 {
        font-size: 15px;
      }

      .legend p {
        font-size: 13px;
      }

      .step-indicator {
        gap: 6px;
        justify-content: flex-start;
      }

      .step-pill {
        font-size: 11px;
        padding: 8px 10px;
      }

      .process-item,
      .card,
      .benefit,
      .help-box {
        padding: 16px;
        border-radius: 18px;
      }

      .footer-nav {
        left: 12px;
        right: 12px;
        bottom: max(10px, env(safe-area-inset-bottom));
      }

      .nav-btn {
        width: 48px;
        height: 48px;
        font-size: 22px;
      }

      .dot {
        width: 10px;
        height: 10px;
      }

      .dot.active {
        width: 24px;
      }
    }

    @media (max-width: 480px) {
      .content {
        padding: 14px 12px 84px;
      }

      .title {
        margin-top: 12px;
        margin-bottom: 10px;
      }

      .subtitle {
        margin-bottom: 14px;
      }

      .team-title {
        font-size: 17px;
      }

      .placeholder {
        font-size: 14px;
        padding: 10px 12px;
      }

      .machine-stage {
        min-height: 280px;
        height: 42vh;
      }

      .legend {
        width: 100%;
      }

      .step-indicator {
        width: 100%;
      }

      .footer-nav {
        gap: 10px;
      }
    }

    @media (max-height: 700px) and (orientation: landscape) {
      .content {
        padding-top: 14px;
        padding-bottom: 76px;
      }

      .logo {
        width: min(24vw, 220px);
      }

      .machine-stage {
        min-height: 260px;
        height: 56vh;
      }

      .title {
        font-size: clamp(26px, 4vw, 54px);
      }

      .subtitle {
        font-size: clamp(15px, 2vw, 24px);
      }

      .desc,
      .section-text {
        font-size: 14px;
        line-height: 1.45;
      }

      .team-box,
      .card,
      .benefit,
      .help-box,
      .process-item {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useRef, useState } = React;

    function Machine3D({ playing = true }) {
      const mountRef = useRef(null);
      const statusRef = useRef(null);

      useEffect(() => {
        const container = mountRef.current;
        if (!container) return;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x101712);

        const camera = new THREE.PerspectiveCamera(
          45,
          container.clientWidth / container.clientHeight,
          0.1,
          1000
        );
        camera.position.set(0, 3, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambient);

        const dir = new THREE.DirectionalLight(0xfff3d6, 1.4);
        dir.position.set(6, 10, 8);
        dir.castShadow = true;
        scene.add(dir);

        const rim = new THREE.PointLight(0x7cb342, 1.1, 50);
        rim.position.set(-6, 5, 4);
        scene.add(rim);

        const floorGeo = new THREE.CircleGeometry(9, 64);
        const floorMat = new THREE.MeshStandardMaterial({
          color: 0x2b3b2d,
          roughness: 0.95,
          metalness: 0.05
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -2.2;
        floor.receiveShadow = true;
        scene.add(floor);

        const platformGeo = new THREE.CylinderGeometry(4.4, 4.8, 0.4, 40);
        const platformMat = new THREE.MeshStandardMaterial({
          color: 0x546e4b,
          roughness: 0.7,
          metalness: 0.12
        });
        const platform = new THREE.Mesh(platformGeo, platformMat);
        platform.position.y = -2;
        platform.receiveShadow = true;
        platform.castShadow = true;
        scene.add(platform);

        const machine = new THREE.Group();
        scene.add(machine);

        const metalMat = new THREE.MeshStandardMaterial({
          color: 0xb0b7bd,
          roughness: 0.48,
          metalness: 0.72
        });
        const darkMetal = new THREE.MeshStandardMaterial({
          color: 0x59656b,
          roughness: 0.52,
          metalness: 0.74
        });
        const blackMat = new THREE.MeshStandardMaterial({
          color: 0x232629,
          roughness: 0.65,
          metalness: 0.35
        });
        const greenMat = new THREE.MeshStandardMaterial({
          color: 0x4caf50,
          roughness: 0.45,
          metalness: 0.25,
          emissive: 0x122812
        });
        const amberMat = new THREE.MeshStandardMaterial({
          color: 0xf9a825,
          roughness: 0.45,
          metalness: 0.2
        });
        const compostMat = new THREE.MeshStandardMaterial({
          color: 0x5d4037,
          roughness: 1,
          metalness: 0.02
        });
        const leafMat = new THREE.MeshStandardMaterial({
          color: 0x6fbf4b,
          roughness: 0.8,
          metalness: 0.05
        });

        const body = new THREE.Mesh(new THREE.BoxGeometry(5.1, 3.2, 3.2), metalMat);
        body.castShadow = true;
        body.receiveShadow = true;
        machine.add(body);

        const frontPanel = new THREE.Mesh(new THREE.BoxGeometry(5.12, 2.7, 0.18), darkMetal);
        frontPanel.position.set(0, 0, 1.6);
        machine.add(frontPanel);

        const hatch = new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.12, 1.4), darkMetal);
        hatch.position.set(0.2, 1.15, -0.1);
        hatch.rotation.z = 0.5;
        machine.add(hatch);

        const funnel = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 1.65, 1.6, 4), metalMat);
        funnel.position.set(0, 2.3, 0);
        funnel.rotation.y = Math.PI / 4;
        funnel.castShadow = true;
        machine.add(funnel);

        const topRing = new THREE.Mesh(new THREE.CylinderGeometry(1.75, 1.75, 0.12, 24), blackMat);
        topRing.position.set(0, 3.05, 0);
        machine.add(topRing);

        const redBtn = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.16, 0.16, 24), new THREE.MeshStandardMaterial({ color: 0xe53935 }));
        redBtn.rotation.x = Math.PI / 2;
        redBtn.position.set(-1.7, 1.08, 1.73);
        machine.add(redBtn);

        const blueBtn = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.16, 0.16, 24), new THREE.MeshStandardMaterial({ color: 0x1e88e5 }));
        blueBtn.rotation.x = Math.PI / 2;
        blueBtn.position.set(-1.25, 1.08, 1.73);
        machine.add(blueBtn);

        const logoPlate = new THREE.Mesh(new THREE.BoxGeometry(2.3, 0.58, 0.08), greenMat);
        logoPlate.position.set(0, 0.68, 1.75);
        machine.add(logoPlate);

        const logoGlow = new THREE.PointLight(0x8bc34a, 0.7, 8);
        logoGlow.position.set(0, 0.68, 2.5);
        scene.add(logoGlow);

        const slot = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.16, 0.36), blackMat);
        slot.position.set(0.7, -0.9, 1.72);
        machine.add(slot);

        const drawer = new THREE.Group();
        const drawerMain = new THREE.Mesh(new THREE.BoxGeometry(1.85, 0.9, 1.3), darkMetal);
        drawerMain.castShadow = true;
        drawerMain.receiveShadow = true;
        drawer.add(drawerMain);

        const drawerFront = new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.95, 0.1), blackMat);
        drawerFront.position.z = 0.7;
        drawer.add(drawerFront);

        const drawerHandle = new THREE.Mesh(new THREE.TorusGeometry(0.18, 0.04, 12, 24), amberMat);
        drawerHandle.position.set(0, 0, 0.78);
        drawer.add(drawerHandle);

        drawer.position.set(-3.3, -1.05, 0);
        scene.add(drawer);

        const wheelGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.4, 26);
        function createWheel(x, z) {
          const wheel = new THREE.Mesh(wheelGeo, blackMat);
          wheel.rotation.z = Math.PI / 2;
          wheel.position.set(x, -1.85, z);
          wheel.castShadow = true;
          machine.add(wheel);
        }
        createWheel(-1.9, 1.25);
        createWheel(1.9, 1.25);
        createWheel(-1.9, -1.25);
        createWheel(1.9, -1.25);

        const axleGeo = new THREE.CylinderGeometry(0.08, 0.08, 2.6, 16);
        const axle1 = new THREE.Mesh(axleGeo, darkMetal);
        axle1.rotation.z = Math.PI / 2;
        axle1.position.set(0, -1.85, 1.25);
        machine.add(axle1);
        const axle2 = new THREE.Mesh(axleGeo, darkMetal);
        axle2.rotation.z = Math.PI / 2;
        axle2.position.set(0, -1.85, -1.25);
        machine.add(axle2);

        const bladeGroup = new THREE.Group();
        const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 2.3, 16), blackMat);
        shaft.rotation.z = Math.PI / 2;
        bladeGroup.add(shaft);

        function blade(angle) {
          const b = new THREE.Mesh(new THREE.BoxGeometry(0.95, 0.08, 0.26), darkMetal);
          b.rotation.z = angle;
          bladeGroup.add(b);
        }
        blade(0);
        blade(Math.PI / 2);
        blade(Math.PI / 4);
        blade(-Math.PI / 4);
        bladeGroup.position.set(0.1, 0.1, 0);
        machine.add(bladeGroup);

        const fruits = [];
        const fruitColors = [0xff7043, 0xffca28, 0x66bb6a, 0xef5350, 0xab47bc];

        for (let i = 0; i < 10; i++) {
          const fruit = new THREE.Mesh(
            new THREE.SphereGeometry(0.18 + Math.random() * 0.08, 20, 20),
            new THREE.MeshStandardMaterial({
              color: fruitColors[i % fruitColors.length],
              roughness: 0.65,
              metalness: 0.05
            })
          );
          fruit.position.set(
            (Math.random() - 0.5) * 1.3,
            4.4 + i * 0.33,
            (Math.random() - 0.5) * 1.1
          );
          fruit.castShadow = true;
          scene.add(fruit);
          fruits.push(fruit);
        }

        const particles = [];
        for (let i = 0; i < 90; i++) {
          const p = new THREE.Mesh(
            new THREE.SphereGeometry(0.05 + Math.random() * 0.03, 8, 8),
            compostMat
          );
          p.visible = false;
          scene.add(p);
          particles.push(p);
        }

        const leaves = [];
        for (let i = 0; i < 14; i++) {
          const leaf = new THREE.Mesh(
            new THREE.SphereGeometry(0.06, 10, 10),
            leafMat
          );
          leaf.scale.set(1.5, 0.6, 0.6);
          leaf.visible = false;
          scene.add(leaf);
          leaves.push(leaf);
        }

        let frame = 0;
        let destroyed = false;

        function updateStatus(step) {
          if (!statusRef.current) return;
          const messages = [
            "1. Coleta: as cascas e restos orgânicos entram pelo funil da máquina.",
            "2. Trituração: as lâminas giram e quebram os resíduos em partes menores.",
            "3. Decomposição acelerada: o material processado vira base para adubo orgânico.",
            "4. Resultado final: o adubo sai na gaveta e pode ser usado no plantio."
          ];
          statusRef.current.innerText = messages[step];
        }

        function animate() {
          if (destroyed) return;
          frame += 1;
          const t = frame * 0.01;

          machine.rotation.y = Math.sin(t * 0.55) * 0.35;
          machine.position.y = Math.sin(t * 1.2) * 0.05;
          drawer.position.z = Math.sin(t * 0.9) * 0.1;

          redBtn.scale.y = 1 + Math.sin(t * 4) * 0.06;
          blueBtn.scale.y = 1 + Math.cos(t * 4) * 0.06;

          let step = 0;
          const cycle = (frame % 900);

          if (cycle < 220) step = 0;
          else if (cycle < 450) step = 1;
          else if (cycle < 670) step = 2;
          else step = 3;

          updateStatus(step);

          fruits.forEach((fruit, i) => {
            if (step === 0) {
              fruit.visible = true;
              fruit.position.y -= 0.03 + i * 0.0008;
              fruit.rotation.x += 0.05;
              fruit.rotation.y += 0.03;
              if (fruit.position.y < 2.95) {
                fruit.position.y = 4.5 + Math.random() * 1.8;
                fruit.position.x = (Math.random() - 0.5) * 1.1;
                fruit.position.z = (Math.random() - 0.5) * 1.0;
              }
            } else {
              fruit.visible = false;
            }
          });

          if (step === 1) {
            bladeGroup.rotation.x += 0.58;
            logoGlow.intensity = 1.2 + Math.sin(t * 12) * 0.25;
            body.material.emissive = new THREE.Color(0x111111);
          } else {
            bladeGroup.rotation.x += 0.12;
            logoGlow.intensity = 0.7;
            body.material.emissive = new THREE.Color(0x000000);
          }

          particles.forEach((p, i) => {
            if (step === 2) {
              p.visible = true;
              const localT = (frame * 0.03 + i) % 20;
              p.position.set(
                1.1 - localT * 0.12,
                -0.95 + Math.sin(localT + i) * 0.12,
                (Math.sin(localT * 1.7 + i) * 0.35)
              );
            } else if (step === 3) {
              p.visible = true;
              p.position.set(-3.3 + (Math.random() - 0.5) * 1.1, -1.0 + Math.random() * 0.45, (Math.random() - 0.5) * 0.9);
            } else {
              p.visible = false;
            }
          });

          if (step === 3) {
            drawer.position.x = -2.45;
            leaves.forEach((leaf, i) => {
              leaf.visible = true;
              leaf.position.set(
                -3.3 + Math.sin(t * 1.8 + i) * 0.6,
                -0.15 + Math.cos(t * 2.4 + i) * 0.22,
                Math.sin(i) * 0.45
              );
              leaf.rotation.z += 0.01 + i * 0.0005;
            });
          } else {
            drawer.position.x += (-3.3 - drawer.position.x) * 0.08;
            leaves.forEach(leaf => leaf.visible = false);
          }

          renderer.render(scene, camera);
          requestAnimationFrame(animate);
        }

        animate();

        const handleResize = () => {
          if (!container) return;
          camera.aspect = container.clientWidth / container.clientHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(container.clientWidth, container.clientHeight);
        };

        window.addEventListener('resize', handleResize);

        return () => {
          destroyed = true;
          window.removeEventListener('resize', handleResize);
          if (renderer.domElement && container.contains(renderer.domElement)) {
            container.removeChild(renderer.domElement);
          }
          renderer.dispose();
        };
      }, []);

      return (
        <div className="machine-stage">
          <div ref={mountRef} style={{ width: '100%', height: '100%' }}></div>
          <div className="shine"></div>
          <div className="machine-overlay">
            <div className="legend">
              <h4>Simulação da máquina AgroTerra</h4>
              <p ref={statusRef}>
                1. Coleta: as cascas e restos orgânicos entram pelo funil da máquina.
              </p>
            </div>
            <div className="step-indicator">
              <div className="step-pill active">COLETA</div>
              <div className="step-pill active">TRITURAÇÃO</div>
              <div className="step-pill active">ADUBO</div>
              <div className="step-pill active">PLANTIO</div>
            </div>
          </div>
        </div>
      );
    }

      const next = () => setSlide((s) => Math.min(s + 1, slides.length - 1));
      const prev = () => setSlide((s) => Math.max(s - 1, 0));

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') next();
          if (e.key === 'ArrowLeft' || e.key === 'PageUp') prev();
          if (e.key.toLowerCase() === 'f') {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
            else document.exitFullscreen?.();
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const onTouchStart = (e) => {
        touchStartX.current = e.changedTouches[0].clientX;
      };

      const onTouchEnd = (e) => {
        touchEndX.current = e.changedTouches[0].clientX;
        if (touchStartX.current == null || touchEndX.current == null) return;
        const diff = touchStartX.current - touchEndX.current;
        if (Math.abs(diff) > 60) {
          if (diff > 0) next();
          else prev();
        }
        touchStartX.current = null;
        touchEndX.current = null;
      };

      return (
        <div className="app" onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
          <div className="bg-layer"></div>

          {slides.map((item, index) => (

          ))}

          <div className="footer-nav">
            <button className="nav-btn" onClick={prev}>‹</button>
            <div className="dots">
              {slides.map((_, i) => (
                <div key={i} className={`dot ${i === slide ? 'active' : ''}`}></div>
              ))}
            </div>
            <button className="nav-btn" onClick={next}>›</button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
