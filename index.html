<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AgroTerra - Apresentação 3D</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body, #root {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #08140d;
      color: white;
      overflow: hidden;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(76, 175, 80, 0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(255, 193, 7, 0.15), transparent 25%),
        linear-gradient(135deg, #07110b 0%, #102718 45%, #182e1d 100%);
    }

    .app {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    .bg-layer {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.25;
      pointer-events: none;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      opacity: 0;
      transform: scale(1.02);
      pointer-events: none;
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .slide.active {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    .slide-shell {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .fullscreen-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: brightness(0.42) saturate(1.1);
    }

    .overlay-dark {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.25), rgba(0,0,0,0.48)),
        linear-gradient(90deg, rgba(0,0,0,0.6), rgba(0,0,0,0.18));
    }

    .content {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      padding: 34px 42px 88px;
      display: flex;
      flex-direction: column;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    .hero-center {
      margin: auto;
      text-align: center;
      max-width: 1100px;
      width: 100%;
    }

    .logo {
      width: min(34vw, 420px);
      max-width: 420px;
      min-width: 180px;
      filter: drop-shadow(0 14px 34px rgba(0,0,0,0.45));
      animation: floatLogo 4s ease-in-out infinite;
    }

    @keyframes floatLogo {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-10px) scale(1.015); }
    }

    .title {
      font-size: clamp(32px, 6vw, 82px);
      font-weight: 900;
      line-height: 0.98;
      margin: 18px 0 16px;
      text-shadow: 0 6px 30px rgba(0,0,0,0.35);
    }

    .subtitle {
      font-size: clamp(18px, 2.3vw, 34px);
      color: #ffe082;
      font-weight: 700;
      margin-bottom: 20px;
      text-shadow: 0 4px 18px rgba(0,0,0,0.35);
    }

    .desc {
      font-size: clamp(15px, 1.5vw, 23px);
      line-height: 1.6;
      color: rgba(255,255,255,0.92);
      max-width: 980px;
      margin: 0 auto;
    }

    .team-box {
      margin: 30px auto 0;
      width: min(920px, 90%);
      padding: 20px 24px;
      border-radius: 22px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.22);
    }

    .team-title {
      font-size: 20px;
      font-weight: 800;
      color: #b8f28a;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .team-placeholders {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 12px;
    }

    .placeholder {
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px dashed rgba(255,255,255,0.35);
      background: rgba(0,0,0,0.14);
      text-align: left;
      color: rgba(255,255,255,0.84);
      min-width: 0;
      word-break: break-word;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .badge {
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      font-weight: 700;
      color: #dcedc8;
      text-align: center;
    }

    .section-title {
      font-size: clamp(28px, 4vw, 58px);
      font-weight: 900;
      margin: 18px 0 10px;
    }

    .section-text {
      font-size: clamp(15px, 1.5vw, 24px);
      line-height: 1.6;
      color: rgba(255,255,255,0.92);
      max-width: 920px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1.12fr;
      gap: 26px;
      align-items: start;
      width: 100%;
      min-height: 0;
      flex: 1;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 18px;
      margin-top: 24px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 16px 45px rgba(0,0,0,0.24);
      backdrop-filter: blur(8px);
      min-width: 0;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: clamp(20px, 2vw, 24px);
      color: #fff59d;
    }

    .card p {
      margin: 0;
      color: rgba(255,255,255,0.9);
      line-height: 1.55;
      font-size: clamp(15px, 1.3vw, 17px);
    }

    .machine-info-wrap {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .machine-stage {
      width: 100%;
      min-height: 540px;
      height: 64vh;
      border-radius: 28px;
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(circle at center, rgba(139, 195, 74, 0.15), transparent 32%),
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)),
        #101712;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    .machine-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .machine-status-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 16px 45px rgba(0,0,0,0.24);
      backdrop-filter: blur(8px);
    }

    .machine-status-card h4 {
      margin: 0 0 8px;
      font-size: 21px;
      color: #b8f28a;
    }

    .machine-status-card p {
      margin: 0;
      font-size: 16px;
      line-height: 1.55;
      color: rgba(255,255,255,0.92);
    }

    .step-indicator {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-start;
    }

    .step-pill {
      padding: 9px 11px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 12px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.78);
      border: 1px solid rgba(255,255,255,0.08);
      white-space: nowrap;
    }

    .step-pill.active {
      background: linear-gradient(90deg, #7cb342, #f9a825);
      color: white;
      box-shadow: 0 10px 24px rgba(124,179,66,0.32);
    }

    .process-list {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 18px;
      margin-top: 28px;
    }

    .process-item {
      padding: 20px;
      border-radius: 22px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      min-width: 0;
    }

    .process-item .num {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #66bb6a, #fbc02d);
      font-weight: 900;
      margin-bottom: 12px;
    }

    .process-item h4 {
      margin: 0 0 8px;
      font-size: clamp(18px, 1.6vw, 21px);
      color: #fff59d;
    }

    .process-item p {
      margin: 0;
      line-height: 1.5;
      color: rgba(255,255,255,0.9);
      font-size: clamp(14px, 1.2vw, 16px);
    }

    .benefits {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 20px;
      margin-top: 22px;
    }

    .benefit {
      border-radius: 24px;
      padding: 22px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 16px 45px rgba(0,0,0,0.24);
      min-width: 0;
    }

    .benefit h3 {
      margin: 0 0 10px;
      color: #b8f28a;
      font-size: clamp(20px, 2vw, 24px);
    }

    .benefit p {
      margin: 0;
      font-size: clamp(15px, 1.3vw, 17px);
      line-height: 1.6;
      color: rgba(255,255,255,0.92);
    }

    .footer-nav {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: max(10px, env(safe-area-inset-bottom));
      z-index: 5;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      pointer-events: none;
    }

    .footer-nav > * {
      pointer-events: auto;
    }

    .nav-btn {
      border: none;
      color: white;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      width: 52px;
      height: 52px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 24px;
      font-weight: bold;
      transition: 0.25s ease;
      backdrop-filter: blur(10px);
      touch-action: manipulation;
    }

    .nav-btn:hover {
      transform: translateY(-2px) scale(1.05);
      background: rgba(255,255,255,0.15);
    }

    .nav-spacer {
      flex: 1;
    }

    .final-quote {
      font-size: clamp(28px, 4.5vw, 68px);
      font-weight: 900;
      line-height: 1.08;
      text-align: center;
      max-width: 1000px;
      margin: 30px auto 0;
    }

    .small-note {
      text-align: center;
      margin-top: 18px;
      color: rgba(255,255,255,0.86);
      font-size: clamp(17px, 2vw, 20px);
    }

    .shine {
      position: absolute;
      inset: 0;
      background: linear-gradient(115deg, transparent 30%, rgba(255,255,255,0.08) 50%, transparent 70%);
      transform: translateX(-100%);
      animation: shineMove 5s linear infinite;
      pointer-events: none;
    }

    @keyframes shineMove {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    @media (max-width: 1100px) {
      .grid-2 {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .process-list,
      .benefits,
      .cards,
      .team-placeholders {
        grid-template-columns: 1fr;
      }

      .machine-stage {
        min-height: 460px;
        height: 56vh;
      }
    }

    @media (max-width: 768px) {
      html, body, #root, .app {
        height: 100dvh;
      }

      .content {
        padding: 16px 14px 78px;
      }

      .top-bar {
        gap: 10px;
        justify-content: center;
      }

      .badge {
        width: 100%;
        padding: 10px 14px;
        font-size: 14px;
      }

      .hero-center {
        margin: 0 auto;
        padding-top: 6px;
        padding-bottom: 4px;
      }

      .logo {
        width: min(68vw, 300px);
        min-width: 140px;
      }

      .team-box {
        width: 100%;
        padding: 16px;
        border-radius: 18px;
      }

      .machine-stage {
        min-height: 380px;
        height: 48vh;
        max-height: 560px;
        border-radius: 22px;
      }

      .process-item,
      .card,
      .benefit,
      .machine-status-card {
        padding: 16px;
        border-radius: 18px;
      }

      .step-indicator {
        gap: 6px;
      }

      .step-pill {
        font-size: 11px;
        padding: 8px 10px;
      }

      .footer-nav {
        left: 10px;
        right: 10px;
        bottom: max(8px, env(safe-area-inset-bottom));
      }

      .nav-btn {
        width: 46px;
        height: 46px;
        font-size: 22px;
      }
    }

    @media (max-width: 480px) {
      .content {
        padding: 12px 10px 72px;
      }

      .title {
        margin-top: 10px;
        margin-bottom: 10px;
      }

      .subtitle {
        margin-bottom: 12px;
      }

      .team-title {
        font-size: 17px;
      }

      .placeholder {
        font-size: 14px;
        padding: 10px 12px;
      }

      .machine-stage {
        min-height: 340px;
        height: 42vh;
      }

      .section-text,
      .desc {
        line-height: 1.5;
      }

      .machine-status-card h4 {
        font-size: 18px;
      }

      .machine-status-card p {
        font-size: 14px;
      }
    }

    @media (max-height: 700px) and (orientation: landscape) {
      .content {
        padding-top: 12px;
        padding-bottom: 68px;
      }

      .logo {
        width: min(24vw, 220px);
      }

      .machine-stage {
        min-height: 300px;
        height: 58vh;
      }

      .title {
        font-size: clamp(26px, 4vw, 54px);
      }

      .subtitle {
        font-size: clamp(15px, 2vw, 24px);
      }

      .desc,
      .section-text {
        font-size: 14px;
        line-height: 1.42;
      }

      .team-box,
      .card,
      .benefit,
      .process-item,
      .machine-status-card {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useRef, useState } = React;

    function Machine3D({ onStepChange }) {
      const mountRef = useRef(null);

      useEffect(() => {
        const container = mountRef.current;
        if (!container) return;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x101712);

        const isMobile = window.innerWidth <= 768;
        const camera = new THREE.PerspectiveCamera(
          isMobile ? 54 : 45,
          container.clientWidth / container.clientHeight,
          0.1,
          1000
        );
        camera.position.set(0.6, isMobile ? 4.1 : 3.3, isMobile ? 14.9 : 12.8);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.96);
        scene.add(ambient);

        const dir = new THREE.DirectionalLight(0xfff3d6, 1.7);
        dir.position.set(8, 12, 9);
        dir.castShadow = true;
        scene.add(dir);

        const rim = new THREE.PointLight(0x7cb342, 1.55, 70);
        rim.position.set(-8, 6, 4);
        scene.add(rim);

        const gold = new THREE.PointLight(0xf9a825, 1.0, 50);
        gold.position.set(7, 3, 7);
        scene.add(gold);

        const floor = new THREE.Mesh(
          new THREE.CircleGeometry(12, 72),
          new THREE.MeshStandardMaterial({ color: 0x2b3b2d, roughness: 0.95, metalness: 0.05 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -3.2;
        floor.receiveShadow = true;
        scene.add(floor);

        const platform = new THREE.Mesh(
          new THREE.CylinderGeometry(6.2, 6.6, 0.52, 52),
          new THREE.MeshStandardMaterial({ color: 0x546e4b, roughness: 0.75, metalness: 0.12 })
        );
        platform.position.y = -2.9;
        platform.receiveShadow = true;
        platform.castShadow = true;
        scene.add(platform);

        const machine = new THREE.Group();
        machine.position.set(-1.2, isMobile ? 1.0 : 0.72, 0);
        scene.add(machine);

        const potGroup = new THREE.Group();
        potGroup.position.set(4.95, -2.05, 0.15);
        scene.add(potGroup);

        const metalMat = new THREE.MeshStandardMaterial({ color: 0xb0b7bd, roughness: 0.42, metalness: 0.78 });
        const darkMetal = new THREE.MeshStandardMaterial({ color: 0x59656b, roughness: 0.52, metalness: 0.74 });
        const blackMat = new THREE.MeshStandardMaterial({ color: 0x232629, roughness: 0.65, metalness: 0.35 });
        const greenMat = new THREE.MeshStandardMaterial({ color: 0x4caf50, roughness: 0.4, metalness: 0.24, emissive: 0x0f2410 });
        const amberMat = new THREE.MeshStandardMaterial({ color: 0xf9a825, roughness: 0.45, metalness: 0.2 });
        const compostMat = new THREE.MeshStandardMaterial({ color: 0x5d4037, roughness: 1, metalness: 0.02 });
        const leafMat = new THREE.MeshStandardMaterial({ color: 0x6fbf4b, roughness: 0.8, metalness: 0.05 });
        const stemMat = new THREE.MeshStandardMaterial({ color: 0x4e8d38, roughness: 0.85, metalness: 0.02 });
        const glassMat = new THREE.MeshPhysicalMaterial({
          color: 0xb7f7b5,
          transparent: true,
          opacity: 0.18,
          transmission: 0.75,
          roughness: 0.08,
          metalness: 0.03
        });

        const body = new THREE.Mesh(new THREE.BoxGeometry(5.3, 3.5, 3.5), metalMat);
        body.castShadow = true;
        body.receiveShadow = true;
        machine.add(body);

        const frontPanel = new THREE.Mesh(new THREE.BoxGeometry(5.34, 2.9, 0.18), darkMetal);
        frontPanel.position.set(0, 0, 1.76);
        machine.add(frontPanel);

        const cutWindow = new THREE.Mesh(new THREE.BoxGeometry(2.35, 1.8, 0.08), glassMat);
        cutWindow.position.set(1.25, 0.18, 1.8);
        machine.add(cutWindow);

        const glowWindow = new THREE.Mesh(
          new THREE.BoxGeometry(2.2, 1.62, 0.04),
          new THREE.MeshBasicMaterial({ color: 0x9cff86, transparent: true, opacity: 0.06 })
        );
        glowWindow.position.set(1.25, 0.18, 1.7);
        machine.add(glowWindow);

        const hatch = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.12, 1.45), darkMetal);
        hatch.position.set(0.2, 1.24, -0.06);
        hatch.rotation.z = 0.46;
        machine.add(hatch);

        const funnel = new THREE.Mesh(new THREE.CylinderGeometry(0.95, 1.8, 1.75, 4), metalMat);
        funnel.position.set(0, 2.5, 0);
        funnel.rotation.y = Math.PI / 4;
        funnel.castShadow = true;
        machine.add(funnel);

        const topRing = new THREE.Mesh(new THREE.CylinderGeometry(1.9, 1.9, 0.12, 28), blackMat);
        topRing.position.set(0, 3.3, 0);
        machine.add(topRing);

        const redBtn = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.16, 0.16, 24), new THREE.MeshStandardMaterial({ color: 0xe53935 }));
        redBtn.rotation.x = Math.PI / 2;
        redBtn.position.set(-1.8, 1.12, 1.88);
        machine.add(redBtn);

        const blueBtn = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.16, 0.16, 24), new THREE.MeshStandardMaterial({ color: 0x1e88e5 }));
        blueBtn.rotation.x = Math.PI / 2;
        blueBtn.position.set(-1.34, 1.12, 1.88);
        machine.add(blueBtn);

        const logoPlate = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.65, 0.08), greenMat);
        logoPlate.position.set(0, 0.7, 1.9);
        machine.add(logoPlate);

        const logoGlow = new THREE.PointLight(0x8bc34a, 1.15, 10);
        logoGlow.position.set(0, 0.72, 2.6);
        scene.add(logoGlow);

        const slot = new THREE.Mesh(new THREE.BoxGeometry(1.82, 0.18, 0.42), blackMat);
        slot.position.set(0.82, -0.98, 1.88);
        machine.add(slot);

        const drawer = new THREE.Group();
        const drawerMain = new THREE.Mesh(new THREE.BoxGeometry(2.05, 0.98, 1.4), darkMetal);
        drawerMain.castShadow = true;
        drawerMain.receiveShadow = true;
        drawer.add(drawerMain);

        const drawerFront = new THREE.Mesh(new THREE.BoxGeometry(2.1, 1.02, 0.1), blackMat);
        drawerFront.position.z = 0.76;
        drawer.add(drawerFront);

        const drawerHandle = new THREE.Mesh(new THREE.TorusGeometry(0.2, 0.045, 12, 24), amberMat);
        drawerHandle.position.set(0, 0, 0.84);
        drawer.add(drawerHandle);
        drawer.position.set(-4.35, -1.18, 0);
        scene.add(drawer);

        const wheelGeo = new THREE.CylinderGeometry(0.52, 0.52, 0.42, 28);
        function createWheel(x, z) {
          const wheel = new THREE.Mesh(wheelGeo, blackMat);
          wheel.rotation.z = Math.PI / 2;
          wheel.position.set(x, -2.0, z);
          wheel.castShadow = true;
          machine.add(wheel);
        }
        createWheel(-2.0, 1.32);
        createWheel(2.0, 1.32);
        createWheel(-2.0, -1.32);
        createWheel(2.0, -1.32);

        const bladeGroup = new THREE.Group();
        const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.13, 2.25, 18), blackMat);
        shaft.rotation.z = Math.PI / 2;
        bladeGroup.add(shaft);

        function addBlade(angle, size = 1) {
          const blade = new THREE.Mesh(new THREE.BoxGeometry(1.1 * size, 0.09, 0.28), darkMetal);
          blade.rotation.z = angle;
          bladeGroup.add(blade);
        }
        addBlade(0, 1);
        addBlade(Math.PI / 2, 1);
        addBlade(Math.PI / 4, 0.92);
        addBlade(-Math.PI / 4, 0.92);
        bladeGroup.position.set(1.08, 0.08, 0.24);
        machine.add(bladeGroup);

        const motor = new THREE.Group();
        const motorBody = new THREE.Mesh(
          new THREE.CylinderGeometry(0.42, 0.42, 1.1, 24),
          darkMetal
        );
        motorBody.rotation.z = Math.PI / 2;
        motorBody.position.set(-2.95, 0.25, -0.95);
        motor.add(motorBody);

        const pulley1 = new THREE.Mesh(new THREE.TorusGeometry(0.25, 0.05, 10, 24), blackMat);
        pulley1.position.set(-2.45, 0.25, -0.95);
        pulley1.rotation.y = Math.PI / 2;
        motor.add(pulley1);

        const pulley2 = new THREE.Mesh(new THREE.TorusGeometry(0.23, 0.05, 10, 24), blackMat);
        pulley2.position.set(0.32, 0.25, -0.92);
        pulley2.rotation.y = Math.PI / 2;
        motor.add(pulley2);

        const belt = new THREE.Mesh(
          new THREE.BoxGeometry(2.78, 0.05, 0.1),
          new THREE.MeshStandardMaterial({ color: 0x1d1d1d, roughness: 0.85, metalness: 0.04 })
        );
        belt.position.set(-1.06, 0.25, -0.94);
        motor.add(belt);
        machine.add(motor);

        const shredGlow = new THREE.PointLight(0xfff176, 0.2, 6);
        shredGlow.position.set(1.1, 0.28, 1.15);
        scene.add(shredGlow);

        const pipeGlow = new THREE.PointLight(0x8bc34a, 0.25, 5);
        pipeGlow.position.set(0.2, -0.65, 1.2);
        scene.add(pipeGlow);

        const fruits = [];
        const fruitColors = [0xff7043, 0xffca28, 0x66bb6a, 0xef5350, 0xab47bc, 0xff8a65];

        for (let i = 0; i < 18; i++) {
          const fruit = new THREE.Mesh(
            new THREE.SphereGeometry(0.15 + Math.random() * 0.08, 18, 18),
            new THREE.MeshStandardMaterial({
              color: fruitColors[i % fruitColors.length],
              roughness: 0.65,
              metalness: 0.04
            })
          );
          fruit.position.set((Math.random() - 0.5) * 1.25, 5.15 + i * 0.22, (Math.random() - 0.5) * 1.0);
          fruit.castShadow = true;
          scene.add(fruit);
          fruits.push(fruit);
        }

        const shreddedPieces = [];
        for (let i = 0; i < 75; i++) {
          const piece = new THREE.Mesh(
            new THREE.BoxGeometry(0.1, 0.06, 0.06),
            new THREE.MeshStandardMaterial({
              color: fruitColors[i % fruitColors.length],
              roughness: 0.82,
              metalness: 0.02
            })
          );
          piece.visible = false;
          scene.add(piece);
          shreddedPieces.push(piece);
        }

        const compostParticles = [];
        for (let i = 0; i < 160; i++) {
          const p = new THREE.Mesh(
            new THREE.SphereGeometry(0.042 + Math.random() * 0.03, 8, 8),
            compostMat
          );
          p.visible = false;
          scene.add(p);
          compostParticles.push(p);
        }

        const streamParticles = [];
        for (let i = 0; i < 70; i++) {
          const p = new THREE.Mesh(
            new THREE.SphereGeometry(0.038, 8, 8),
            new THREE.MeshStandardMaterial({ color: 0x8d6e63, roughness: 1, metalness: 0.02 })
          );
          p.visible = false;
          scene.add(p);
          streamParticles.push(p);
        }

        const soilTop = new THREE.Mesh(
          new THREE.CylinderGeometry(1.1, 1.2, 0.92, 32),
          new THREE.MeshStandardMaterial({ color: 0x5d4037, roughness: 1, metalness: 0.02 })
        );
        soilTop.position.y = 0.25;
        potGroup.add(soilTop);

        const pot = new THREE.Mesh(
          new THREE.CylinderGeometry(1.32, 1.05, 1.72, 36, 1, true),
          new THREE.MeshStandardMaterial({ color: 0x8d6e63, roughness: 0.96, metalness: 0.04 })
        );
        pot.castShadow = true;
        pot.receiveShadow = true;
        potGroup.add(pot);

        const soilPulse = new THREE.PointLight(0x8bc34a, 0.1, 4);
        soilPulse.position.set(0, 0.75, 0.2);
        potGroup.add(soilPulse);

        const stem = new THREE.Mesh(
          new THREE.CylinderGeometry(0.07, 0.1, 2.4, 12),
          stemMat
        );
        stem.position.y = 1.2;
        stem.scale.y = 0.08;
        potGroup.add(stem);

        const leaves = [];
        function makeLeaf(x, y, z, rz) {
          const leaf = new THREE.Mesh(
            new THREE.SphereGeometry(0.24, 16, 16),
            leafMat
          );
          leaf.scale.set(0.18, 0.06, 0.1);
          leaf.position.set(x, y, z);
          leaf.rotation.z = rz;
          potGroup.add(leaf);
          leaves.push(leaf);
        }
        makeLeaf(0.34, 1.34, 0, -0.65);
        makeLeaf(-0.36, 1.48, 0.08, 0.75);
        makeLeaf(0.42, 1.78, -0.04, -0.45);
        makeLeaf(-0.28, 2.0, 0.03, 0.55);
        makeLeaf(0.18, 2.2, 0.08, -0.12);
        makeLeaf(-0.18, 2.28, -0.06, 0.22);

        const flowerCore = new THREE.Mesh(
          new THREE.SphereGeometry(0.11, 16, 16),
          new THREE.MeshStandardMaterial({ color: 0xffca28, roughness: 0.7, metalness: 0.05 })
        );
        flowerCore.position.set(0, 2.65, 0);
        flowerCore.scale.set(0.01, 0.01, 0.01);
        potGroup.add(flowerCore);

        const petals = [];
        for (let i = 0; i < 8; i++) {
          const petal = new THREE.Mesh(
            new THREE.SphereGeometry(0.12, 12, 12),
            new THREE.MeshStandardMaterial({ color: i % 2 === 0 ? 0xff8a80 : 0xffab91, roughness: 0.7, metalness: 0.05 })
          );
          const a = (Math.PI * 2 * i) / 8;
          petal.position.set(Math.cos(a) * 0.22, 2.65 + Math.sin(a) * 0.03, Math.sin(a) * 0.22);
          petal.scale.set(0.01, 0.01, 0.01);
          potGroup.add(petal);
          petals.push(petal);
        }

        const soilBumps = [];
        for (let i = 0; i < 18; i++) {
          const bump = new THREE.Mesh(
            new THREE.SphereGeometry(0.08 + Math.random() * 0.05, 10, 10),
            compostMat
          );
          bump.position.set(
            (Math.random() - 0.5) * 1.4,
            0.72 + Math.random() * 0.12,
            (Math.random() - 0.5) * 1.2
          );
          bump.visible = false;
          potGroup.add(bump);
          soilBumps.push(bump);
        }

        let frame = 0;
        let destroyed = false;
        let lastStep = -1;

        function animate() {
          if (destroyed) return;
          frame += 1;
          const t = frame * 0.01;

          const camTargetX = 0.6 + Math.sin(t * 0.25) * 0.18;
          const camTargetY = (isMobile ? 4.1 : 3.3) + Math.sin(t * 0.22) * 0.08;
          camera.position.x += (camTargetX - camera.position.x) * 0.02;
          camera.position.y += (camTargetY - camera.position.y) * 0.02;
          camera.lookAt(0.6, 0.45, 0);

          machine.rotation.y = Math.sin(t * 0.42) * 0.16;
          machine.rotation.x = Math.sin(t * 0.7) * 0.018;
          machine.position.y = (isMobile ? 1.0 : 0.72) + Math.sin(t * 1.1) * 0.04;

          potGroup.rotation.y = -0.42 + Math.sin(t * 0.45) * 0.08;
          drawer.position.z = Math.sin(t * 0.65) * 0.06;

          redBtn.scale.y = 1 + Math.sin(t * 5) * 0.1;
          blueBtn.scale.y = 1 + Math.cos(t * 5) * 0.1;

          let step = 0;
          const cycle = frame % 1100;
          if (cycle < 240) step = 0;
          else if (cycle < 540) step = 1;
          else if (cycle < 810) step = 2;
          else step = 3;

          if (step !== lastStep) {
            lastStep = step;
            onStepChange?.(step);
          }

          pulley1.rotation.z += step === 1 ? 0.22 : 0.06;
          pulley2.rotation.z += step === 1 ? 0.22 : 0.06;
          belt.position.y = 0.25 + Math.sin(t * (step === 1 ? 22 : 8)) * 0.008;

          fruits.forEach((fruit, i) => {
            if (step === 0) {
              fruit.visible = true;
              fruit.position.y -= 0.048 + i * 0.0007;
              fruit.rotation.x += 0.07;
              fruit.rotation.y += 0.05;
              if (fruit.position.y < 3.25) {
                fruit.position.y = 5.1 + Math.random() * 1.8;
                fruit.position.x = (Math.random() - 0.5) * 1.22;
                fruit.position.z = (Math.random() - 0.5) * 1.0;
              }
            } else {
              fruit.visible = false;
            }
          });

          if (step === 1) {
            bladeGroup.rotation.x += 1.05;
            bladeGroup.rotation.y += 0.14;
            shredGlow.intensity = 1.35 + Math.sin(t * 18) * 0.35;
            logoGlow.intensity = 1.5 + Math.sin(t * 12) * 0.35;
            body.material.emissive = new THREE.Color(0x151515);

            shreddedPieces.forEach((piece, i) => {
              piece.visible = true;
              const radius = 0.22 + (i % 7) * 0.055;
              const ang = t * 6.2 + i * 0.45;
              piece.position.set(
                1.1 + Math.cos(ang) * radius,
                0.15 + Math.sin(ang * 1.9) * 0.5,
                0.22 + Math.sin(ang) * 0.28
              );
              piece.rotation.x += 0.22;
              piece.rotation.y += 0.17;
              piece.rotation.z += 0.12;
            });
          } else {
            bladeGroup.rotation.x += 0.16;
            bladeGroup.rotation.y *= 0.96;
            shredGlow.intensity = 0.18;
            logoGlow.intensity = 1.02;
            body.material.emissive = new THREE.Color(0x000000);
            shreddedPieces.forEach(piece => piece.visible = false);
          }

          compostParticles.forEach((p, i) => {
            if (step === 2) {
              p.visible = true;
              const localT = (frame * 0.06 + i * 0.28) % 25;
              p.position.set(
                1.95 - localT * 0.13,
                -0.1 - Math.sin(localT * 0.55 + i) * 0.62,
                Math.sin(localT + i) * 0.38
              );
            } else if (step === 3) {
              p.visible = true;
              p.position.set(
                -4.2 + Math.random() * 2.25,
                -1.02 + Math.random() * 0.65,
                (Math.random() - 0.5) * 1.0
              );
            } else {
              p.visible = false;
            }
          });

          streamParticles.forEach((p, i) => {
            if (step === 3) {
              p.visible = true;
              const progress = (frame * 0.023 + i * 0.05) % 1;
              const sx = -2.75;
              const sy = -0.9;
              const ex = 4.85;
              const ey = -0.98;
              p.position.set(
                sx + (ex - sx) * progress,
                sy + Math.sin(progress * Math.PI) * 1.08,
                0.15 + Math.sin(progress * 9 + i) * 0.12
              );
            } else {
              p.visible = false;
            }
          });

          if (step === 3) {
            drawer.position.x = -3.1;
            pipeGlow.intensity = 0.95 + Math.sin(t * 8) * 0.18;
          } else {
            drawer.position.x += (-4.35 - drawer.position.x) * 0.08;
            pipeGlow.intensity = 0.18;
          }

          const growthTarget = step === 3 ? 1 : 0.08;
          stem.scale.y += (growthTarget - stem.scale.y) * (step === 3 ? 0.04 : 0.08);
          stem.position.y = 0.18 + stem.scale.y * 1.18;
          stem.rotation.z = Math.sin(t * 1.1) * 0.02;

          leaves.forEach((leaf, i) => {
            const desired = step === 3 ? 1 : 0.08;
            const targetX = 1.8 * desired;
            const targetY = 0.65 * desired;
            const targetZ = 1 * desired;
            leaf.scale.x += (targetX - leaf.scale.x) * 0.05;
            leaf.scale.y += (targetY - leaf.scale.y) * 0.05;
            leaf.scale.z += (targetZ - leaf.scale.z) * 0.05;
            leaf.rotation.y = Math.sin(t * 2 + i * 0.7) * 0.2;
          });

          const flowerDesired = step === 3 ? 1 : 0.01;
          flowerCore.scale.x += (flowerDesired - flowerCore.scale.x) * 0.05;
          flowerCore.scale.y += (flowerDesired - flowerCore.scale.y) * 0.05;
          flowerCore.scale.z += (flowerDesired - flowerCore.scale.z) * 0.05;

          petals.forEach((petal, i) => {
            const desired = step === 3 ? 1 : 0.01;
            petal.scale.x += ((1.2 * desired) - petal.scale.x) * 0.05;
            petal.scale.y += ((0.7 * desired) - petal.scale.y) * 0.05;
            petal.scale.z += ((1.2 * desired) - petal.scale.z) * 0.05;
            petal.rotation.y = Math.sin(t * 2 + i) * 0.18;
          });

          soilBumps.forEach((b, i) => {
            if (step === 3) {
              b.visible = true;
              b.position.y = 0.72 + Math.sin(t * 3 + i) * 0.03;
            } else {
              b.visible = false;
            }
          });

          soilPulse.intensity = step === 3 ? 0.8 + Math.sin(t * 6) * 0.2 : 0.08;

          renderer.render(scene, camera);
          requestAnimationFrame(animate);
        }

        animate();

        const handleResize = () => {
          if (!container) return;
          camera.aspect = container.clientWidth / container.clientHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(container.clientWidth, container.clientHeight);
        };

        window.addEventListener('resize', handleResize);

        return () => {
          destroyed = true;
          window.removeEventListener('resize', handleResize);
          if (renderer.domElement && container.contains(renderer.domElement)) {
            container.removeChild(renderer.domElement);
          }
          renderer.dispose();
        };
      }, [onStepChange]);

      return (
        <div className="machine-stage">
          <div ref={mountRef} style={{ width: '100%', height: '100%' }}></div>
          <div className="shine"></div>
        </div>
      );
    }

                      </p>
                    </div>
                    <div className="benefit">
                      <h3>Possibilidade de venda</h3>
                      <p>
                        O composto pode ser embalado e vendido, mostrando também uma ideia de empreendedorismo sustentável,
                        com geração de renda e impacto positivo.
                      </p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )
        },
        {
          key: "final",
          render: () => (
            <div className="slide-shell">
              <div
                className="fullscreen-bg"
                style={{
                  backgroundImage:
                    "url('https://images.unsplash.com/photo-1473448912268-2022ce9509d8?auto=format&fit=crop&w=1600&q=80')"
                }}
              ></div>
              <div className="overlay-dark"></div>
              <div className="content">
                <div className="hero-center">
                  <img
                    className="logo"
                    src="https://uanwhlztrsoxjihhspwy.supabase.co/storage/v1/object/public/bucket-padrao/fotos%20site%20(7).png"
                    alt="Logo AgroTerra"
                  />
                  <div className="final-quote">
                    Plantando hoje,<br />
                    alimentando o amanhã.
                  </div>
                  <div className="small-note">
                    Obrigado pela atenção!
                  </div>
                  <div className="team-box" style={{ maxWidth: '780px' }}>
                    <div className="team-title">Mensagem final</div>
                    <div className="desc" style={{ fontSize: '20px' }}>
                      A AgroTerra mostra que pequenas ideias podem gerar grandes mudanças.
                      Ao reaproveitar resíduos orgânicos, cuidamos da natureza, fortalecemos a agricultura
                      e construímos um futuro mais sustentável.
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )
        }
      ];

      const next = () => setSlide((s) => Math.min(s + 1, slides.length - 1));
      const prev = () => setSlide((s) => Math.max(s - 1, 0));

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') next();
          if (e.key === 'ArrowLeft' || e.key === 'PageUp') prev();
          if (e.key.toLowerCase() === 'f') {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
            else document.exitFullscreen?.();
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const onTouchStart = (e) => {
        touchStartX.current = e.changedTouches[0].clientX;
      };

      const onTouchEnd = (e) => {
        touchEndX.current = e.changedTouches[0].clientX;
        if (touchStartX.current == null || touchEndX.current == null) return;
        const diff = touchStartX.current - touchEndX.current;
        if (Math.abs(diff) > 60) {
          if (diff > 0) next();
          else prev();
        }
        touchStartX.current = null;
        touchEndX.current = null;
      };

      return (
        <div className="app" onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
          <div className="bg-layer"></div>

          {slides.map((item, index) => (
            <div key={item.key} className={`slide ${index === slide ? 'active' : ''}`}>
              {index === slide ? item.render() : null}
            </div>
          ))}

          <div className="footer-nav">
            <button className="nav-btn" onClick={prev}>‹</button>
            <div className="nav-spacer"></div>
            <button className="nav-btn" onClick={next}>›</button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
